# Starship configuration — Tokyo Night preset (extended)
# Base: https://starship.rs/presets/tokyo-night
"$schema" = 'https://starship.rs/config-schema.json'

# Left prompt: OS → directory → git → languages
format = """
[░▒▓](#a3aed2)\
[  ](bg:#a3aed2 fg:#090c0c)\
[](bg:#769ff0 fg:#a3aed2)\
$directory\
[](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[](fg:#394260 bg:#212736)\
$nodejs\
$bun\
$python\
$rust\
$golang\
[](fg:#212736)\
\n$character"""

# Right prompt: status, duration, jobs, cloud/devops contexts
right_format = """
$status\
$cmd_duration\
$jobs\
$aws\
$terraform\
$kubernetes\
"""

# ── Directory ──────────────────────────────────────────────
[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

# ── Git ────────────────────────────────────────────────────
[git_branch]
symbol = ""
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

# ── Languages ──────────────────────────────────────────────
[nodejs]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol node $version ](fg:#769ff0 bg:#212736)]($style)'

[bun]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol bun $version ](fg:#769ff0 bg:#212736)]($style)'

[python]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol py $version( \($virtualenv\)) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol rs $version ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol go $version ](fg:#769ff0 bg:#212736)]($style)'

# ── Time ───────────────────────────────────────────────────
[time]
disabled = true

# ── Character (prompt symbol) ──────────────────────────────
[character]
success_symbol = '[❯](bold #9ece6a)'
error_symbol   = '[❯](bold #f7768e)'
vimcmd_symbol  = '[❮](bold #9ece6a)'

# ── Right: Status & Duration ───────────────────────────────
[status]
disabled = false
symbol = "✘ "
format = '[$symbol$status]($style) '
style = "bold #f7768e"

[cmd_duration]
min_time = 2_000
format = '[󱦟 $duration]($style) '
style = "#a0a9cb"

[jobs]
format = '[⚙ $number]($style) '
style = "#a0a9cb"

# ── Right: Cloud / DevOps ──────────────────────────────────
[aws]
symbol = "  "
format = '[$symbol($profile)(\($region\))]($style) '
style = "#ff9e64"

[terraform]
symbol = "󱁢 "
format = '[$symbol$workspace]($style) '
style = "#7aa2f7"

[kubernetes]
disabled = true
